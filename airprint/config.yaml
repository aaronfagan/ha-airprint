name: AirPrint
version: "6.1.3"
slug: airprint
description: AirPrint bridge for network printers that do not support it
url: https://github.com/aaronfagan/ha-airprint
arch:
  - amd64
init: true
boot: auto
startup: services
host_network: true
homeassistant_api: true
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: Printer status API, used by the AirPrint integration
map:
  - addon_config:rw
  - share:rw
options:
  printers: []
schema:
  printers:
    - name: str
      device: str?
      address: str?
      location: str?
      emoji: str?
