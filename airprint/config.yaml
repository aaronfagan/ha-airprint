name: AirPrint
version: "1.11.3"
slug: airprint
description: AirPrint bridge for network printers that do not support it
url: https://github.com/aaronfagan/ha-airprint
image: ghcr.io/aaronfagan/ha-airprint/airprint
arch:
  - amd64
  - aarch64
init: true
boot: auto
startup: services
host_network: true
homeassistant_api: true
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: Printer status API, used by the AirPrint integration
map:
  - addon_config:rw
  - share:rw
options:
  printers: []
schema:
  printers:
    - icon: list(🖨️|📠|📄|📁|☁️|🏢|🏠)?
      name: str
      location: str?
      device: str?
      driver: url?
