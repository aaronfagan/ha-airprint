name: AirPrint
version: "3.0.2"
slug: airprint
description: AirPrint bridge for network printers that do not support it
url: https://github.com/aaronfagan/ha-airprint
arch:
  - amd64
init: true
boot: auto
startup: services
host_network: true
homeassistant_api: true
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: Printer status API, used by the AirPrint integration
map:
  - addon_config:rw
options:
  printers:
    - name: Canon MF4890DW
      address: ""
      location: Office
      emoji: 🖨️
schema:
  printers:
    - name: str
      address: str?
      location: str?
      emoji: list(🖨️|🖨|📠|📄|🏢|🏠|none)?
