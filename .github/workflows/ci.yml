name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  versions:
    name: Versions agree
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: |
          addon=$(yq -r '.version' airprint/config.yaml)
          integration=$(jq -r '.version' custom_components/airprint/manifest.json)

          echo "add-on=${addon} integration=${integration}"

          if [ "${addon}" != "${integration}" ]; then
            echo "::error::The add-on and the integration are on different versions. Use scripts/version.sh."
            exit 1
          fi

  scripts:
    name: Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: They must parse
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          for script in airprint/*.sh scripts/*.sh; do
            bash -n "${script}"
            shellcheck -S warning "${script}" || true
          done

  addon:
    name: Add-on (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: aarch64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: The image must build
        uses: docker/build-push-action@v6
        with:
          context: airprint
          platforms: ${{ matrix.platform }}
          push: false
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=max

  integration:
    name: Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: It must compile
        run: python -m compileall -q custom_components/airprint

      - uses: home-assistant/actions/hassfest@master

      - uses: hacs/action@main
        with:
          category: integration
