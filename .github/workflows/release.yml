name: Release

on:
  push:
    tags:
      - "v*"

env:
  IMAGE: ghcr.io/${{ github.repository }}/airprint

jobs:
  verify:
    name: Verify version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: The tag, the add-on and the integration must agree
        id: version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          addon=$(yq -r '.version' airprint/config.yaml)
          integration=$(jq -r '.version' custom_components/airprint/manifest.json)

          echo "tag=${tag} add-on=${addon} integration=${integration}"

          if [ "${tag}" != "${addon}" ] || [ "${tag}" != "${integration}" ]; then
            echo "::error::Version mismatch. Run scripts/version.sh ${tag} and commit before tagging."
            exit 1
          fi

          echo "version=${tag}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.arch }}
    needs: verify
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: aarch64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: airprint
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.IMAGE }}:${{ needs.verify.outputs.version }}-${{ matrix.arch }}
          build-args: |
            BUILD_VERSION=${{ needs.verify.outputs.version }}
            BUILD_ARCH=${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=max

  publish:
    name: Publish
    needs: [verify, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: One image, both architectures
        env:
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE}:${VERSION}" \
            --tag "${IMAGE}:latest" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-aarch64"

      - name: Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes
